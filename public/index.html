<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic Setup -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#041924" />

    <!-- SEO Title -->
    <title>
      ESK Strategic Solutions | Business Consulting & Digital Solutions
    </title>

    <!-- SEO Description -->
    <meta
      name="description"
      content="ESK Strategic Solutions provides strategic consulting, custom software development, managed IT services, cloud solutions, automation, and business transformation services across South Africa."
    />

    <!-- SEO Keywords -->
    <meta
      name="keywords"
      content="business consulting, software development, managed IT services, cloud strategy, digital transformation, Johannesburg, South Africa, strategic solutions, business optimisation, IT infrastructure"
    />

    <!-- Author -->
    <meta name="author" content="ESK Strategic Solutions" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="ESK Strategic Solutions" />
    <meta
      property="og:description"
      content="Strategic solutions for growth, innovation, and digital excellence."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.eskstrategic.co.za" />
    <meta
      property="og:image"
      content="https://www.eskstrategic.co.za/logo.png"
    />

    <!-- Twitter Sharing -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ESK Strategic Solutions" />
    <meta
      name="twitter:description"
      content="Strategic solutions for growth, innovation, and digital excellence."
    />
    <meta
      name="twitter:image"
      content="https://www.eskstrategic.co.za/logo.png"
    />
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- React Root -->
    <div id="root"></div>
  </body>
</html>
